<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grade Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>🎓 Student Grade Calculator</h2>
</nav>

<div class="container">

    <div class="card">

        <h1>Student Grade Calculator</h1>

        <input type="number" id="sub1" placeholder="English Marks">
        <input type="number" id="sub2" placeholder="Mathematics Marks">
        <input type="number" id="sub3" placeholder="Science Marks">
        <input type="number" id="sub4" placeholder="Computer Marks">
        <input type="number" id="sub5" placeholder="Social Marks">

        <button onclick="calculateGrade()">
            Calculate Grade
        </button>

        <div id="result"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
